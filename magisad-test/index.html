<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300,height=600">
<title>Magisterium AI Ad</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

.ad {
  width:300px;
  height:600px;
  padding:10px;
}

#gate {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.gate-inner {
  text-align:center;
}

input {
  padding:10px;
  margin-top:10px;
  width:180px;
}

button {
  margin-top:10px;
  padding:10px;
  background:#f5c85b;
  border:none;
}

.messages {
  height:350px;
  overflow:auto;
  margin-top:10px;
}

.bubble {
  margin:6px 0;
  padding:8px;
  border-radius:8px;
}

.bot { background:#222; }
.user { background:#f5c85b; color:#000; }

textarea {
  width:100%;
  height:40px;
}
</style>
</head>

<body>

<!-- PASSCODE GATE -->
<div id="gate">
  <div class="gate-inner">
    <h3>Enter Passcode</h3>
    <input id="passcodeInput" type="password">
    <button onclick="unlock()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<div class="ad">

<h2>Ask a Catholic AI question</h2>

<div class="messages" id="messages"></div>

<form id="form">
<textarea id="input"></textarea>
<button>Send</button>
</form>

</div>

<script>
const API = "https://magai-ad-1.vmr.workers.dev";
let PASSCODE = null;

function unlock() {
  const val = document.getElementById("passcodeInput").value;

  fetch(API, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-passcode": val
    },
    body:JSON.stringify({
      messages:[{role:"user",content:"test"}]
    })
  }).then(res=>{
    if(res.status === 401){
      document.getElementById("error").innerText = "Wrong passcode";
    } else {
      PASSCODE = val;
      sessionStorage.setItem("passcode", val);
      document.getElementById("gate").style.display="none";
    }
  });
}

if(sessionStorage.getItem("passcode")){
  PASSCODE = sessionStorage.getItem("passcode");
  document.addEventListener("DOMContentLoaded",()=>{
    document.getElementById("gate").style.display="none";
  });
}

function add(role,text){
  const div=document.createElement("div");
  div.className="bubble "+role;
  div.innerHTML=text;
  document.getElementById("messages").appendChild(div);
}

async function send(msg){
  add("user",msg);

  const res = await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-passcode": PASSCODE
    },
    body:JSON.stringify({
      messages:[{role:"user",content:msg}]
    })
  });

  const data = await res.json();

  let answer = data.answer || "No response";

  answer += "<br><br>👉 <a href='https://www.magisterium.com/' target='_blank'>Click here for the full experience</a>";

  add("bot",answer);
}

document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();
  const val=document.getElementById("input").value;
  document.getElementById("input").value="";
  send(val);
});
</script>

</body>
</html>
